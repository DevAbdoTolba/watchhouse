# home_cctv cameras.yaml — committed Phase 0 artifact, consumed by Phase 1+
# Ground truth: cameras.txt + terminal.txt + PHASE0-REPORT.json sub-stream
# measurements (2026-04-16 sweep).
#
# ``native_fps`` is kept as a BACKWARD-COMPATIBLE alias for ``main_stream_fps``
# so any legacy consumer still works. Phase 0 and Phase 1+ MUST key their
# exit criteria / ByteTracker frame_rate on the SUB-stream fps (the rate we
# actually ingest at /1, /11, /21, /31), not the main-stream rate at /0/10/20/30.
# The DVR halves frame rate on sub-streams; empirically (2026-04-16 2-hour sweep)
# sub-stream rates are ~15 fps for the 720p25 cams and ~6 fps for the 1080p12 cams.
dvr:
  host_env: DVR_IP
  port_env: DVR_PORT
  user_env: DVR_USER
  pass_env: DVR_PASS
  vendor: "Cantonk/HeroSpeed OEM (BitVision ecosystem)"
cameras:
  - id: 1
    name: exterior_red
    location: "upper-right corner, front facade"
    coverage: "right-to-left approach along front"
    sub_path: "/1"
    main_path: "/0"
    codec: hevc
    main_stream_fps: 25   # native /0 rate (AHD 720P25)
    sub_stream_fps: 15    # measured on /1 over 1800s (2026-04-16 sweep: 14.97)
    native_fps: 25        # legacy alias kept for backward compatibility — do NOT use for exit criteria
    native_width: 1280
    native_height: 720
    audio_multiplex: true
    notes: "Channel 01, AHD 720P25, H.265"
  - id: 2
    name: interior_orange
    location: "above primary entrance door"
    coverage: "staircase + central floor"
    sub_path: "/11"
    main_path: "/10"
    codec: hevc
    main_stream_fps: 12   # native /10 rate (AHD 5MP12)
    sub_stream_fps: 6     # measured on /11 over 1800s (2026-04-16 sweep: 5.99)
    native_fps: 12        # legacy alias
    native_width: 1920
    native_height: 1080
    sensor_native: "5MP"
    audio_multiplex: true
    notes: "Channel 02, AHD 5MP12 downscaled 1080p, H.265"
  - id: 3
    name: exterior_blue
    location: "upper-left corner, front facade"
    coverage: "left-to-right approach along front"
    sub_path: "/21"
    main_path: "/20"
    codec: hevc
    main_stream_fps: 12   # native /20 rate
    sub_stream_fps: 6     # measured on /21 over 1800s (2026-04-16 sweep: 6.00)
    native_fps: 12        # legacy alias
    native_width: 1920
    native_height: 1080
    sensor_native: "5MP"
    audio_multiplex: false
    nal_unit_0_workaround_required: true
    notes: "Channel 03, AHD 5MP12 downscaled 1080p, H.265 V-only. Orphaned audio NAL header — requires +discardcorrupt mandatory."
  - id: 4
    name: interior_green
    location: "above staircase landing"
    coverage: "rear-to-front view of primary entrance"
    sub_path: "/31"
    main_path: "/30"
    codec: hevc
    main_stream_fps: 25   # native /30 rate (AHD 720P25)
    sub_stream_fps: 15    # measured on /31 over 1800s (2026-04-16 sweep: 14.98)
    native_fps: 25        # legacy alias
    native_width: 1280
    native_height: 720
    audio_multiplex: false
    nal_unit_0_workaround_required: true
    known_hazard: "exterior-door backlight blowout during day; silhouetting at night"
    notes: "Channel 04, AHD 720P25, H.265 V-only. Same NAL workaround as Cam 3."
